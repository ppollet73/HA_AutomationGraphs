name: "Automations Graph"
version: "1.7.2"
slug: "automation_graph"
description: "Graphe interactif des automations Home Assistant (declencheurs, conditions, actions, liens inter-automations), lu en direct depuis Home Assistant a chaque ouverture."
url: "https://github.com/ppollet73/HA_AutomationGraphs"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:graph-outline
panel_title: "Automations Graph"
homeassistant_api: true
hassio_api: false
watchdog: "http://[HOST]:[PORT:8099]/healthz"
map: []
options:
  device_cache_minutes: 10
  config_cache_minutes: 10
  enable_ai_descriptions: false
  ai_task_entity_id: ""
  log_level: "info"
schema:
  device_cache_minutes: int(1,1440)
  config_cache_minutes: int(1,1440)
  enable_ai_descriptions: bool
  ai_task_entity_id: str
  log_level: "list(debug|info|warning|error)"
