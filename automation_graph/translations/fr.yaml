configuration:
  device_cache_minutes:
    name: "Cache du registre (minutes)"
    description: >-
      Duree de mise en cache des noms d'appareils et des categories
      d'automations, lus depuis le registre Home Assistant (WebSocket).
      Augmente cette valeur si tu changes rarement tes appareils/categories,
      diminue-la si tu veux voir tes changements plus vite.
  config_cache_minutes:
    name: "Cache des configurations d'automation (minutes)"
    description: >-
      Duree de mise en cache des configurations d'automation (declencheurs,
      conditions, actions), lues depuis l'API coeur Home Assistant. Pendant
      cette duree, l'ouverture de la page ne relit que la liste des
      automations et leur etat (toujours a jour), pas leur configuration
      complete : cela evite un appel a l'API Home Assistant par automation a
      chaque ouverture. Une automation modifiee dans Home Assistant apparait
      au plus tard apres ce delai, ou immediatement via le bouton
      "Recalculer (live)" qui force un rechargement complet.
  enable_ai_descriptions:
    name: "Descriptions IA"
    description: >-
      Active la generation de descriptions en langage naturel des
      automations via le service natif Home Assistant ai_task.generate_data.
      Desactive par defaut : aucune donnee ne quitte alors jamais ton reseau
      pour cette fonctionnalite. PREREQUIS pour que ce soit utile : (1) une
      entite ai_task.* doit deja exister dans Home Assistant (ex. integration
      "OpenAI Conversation" avec la fonctionnalite AI Task activee, ou toute
      autre integration compatible AI Task) ; (2) cette entite doit etre
      fonctionnelle, avec un credit/quota suffisant chez son fournisseur. Si
      ces conditions ne sont pas remplies, l'add-on retombe automatiquement
      et silencieusement sur une description locale (regarde le journal de
      l'add-on pour voir pourquoi).
  ai_task_entity_id:
    name: "Entite ai_task a utiliser"
    description: >-
      Optionnel. ID de l'entite ai_task a utiliser pour les descriptions IA
      (ex: ai_task.openai_ai_task). Laisser vide pour une detection
      automatique de la premiere entite ai_task.* trouvee dans Home
      Assistant. Sans effet si "Descriptions IA" est desactive.
  log_level:
    name: "Niveau de journalisation"
    description: >-
      Niveau des messages affiches dans le Journal (Log) de l'add-on :
      debug, info (defaut), warning ou error. "info" conserve le comportement
      habituel (chaque requete, chaque appel Home Assistant, chaque
      generation de description IA est journalise). "warning" ou "error"
      masquent ces lignes de suivi et ne conservent que les avertissements et
      erreurs (ex. echec d'appel HA, quota IA depasse). Ne change pas ce qui
      est fait par l'add-on, seulement ce qui est visible dans le journal.
